<div class="image-component image-hero-booking">
    {% set base = "./" ~ component.content.slug ~ "." ~ component.content.format %}
    {% if component.content.format != "svg" and component.content.format != "gif" %}
    <img src="{{ base }}"
         srcset="{{ base }}?w=480 480w, {{ base }}?w=720 720w, {{ base }}?w=1080 1080w, {{ base }}?w=1440 1440w, {{ base }}?w=2048 2048w"
         sizes="100vw"
         alt="{{ component.content.alt_text | default(value='') }}"
         loading="eager"
         fetchpriority="high"
         decoding="async">
    {% else %}
    <img src="{{ base }}"
         alt="{{ component.content.alt_text | default(value='') }}"
         loading="eager"
         fetchpriority="high"
         decoding="async">
    {% endif %}

    <div class="hero-booking-overlay">
        <div class="hero-booking-content">
            {% if component.title %}
            <h1 class="hero-booking-title">{{ component.title }}</h1>
            {% endif %}

            <form class="booking-form" onsubmit="return submitBooking(this)">
                <div class="booking-fields">
                    <div class="booking-field">
                        <label for="checkin">{{ labels["booking.checkin"] | default(value="Check-in") }}</label>
                        <input type="text" id="checkin" placeholder="{{ labels['booking.select_date'] | default(value='Select date') }}" readonly>
                    </div>
                    <div class="booking-field">
                        <label for="checkout">{{ labels["booking.checkout"] | default(value="Check-out") }}</label>
                        <input type="text" id="checkout" placeholder="{{ labels['booking.select_date'] | default(value='Select date') }}" readonly>
                    </div>
                    <div class="booking-field">
                        <label for="guests">{{ labels["booking.guests"] | default(value="Guests") }}</label>
                        <select id="guests">
                            <option value="1">1 {{ labels["booking.guest_one"] | default(value="Guest") }}</option>
                            <option value="2" selected>2 {{ labels["booking.guests"] | default(value="Guests") }}</option>
                            <option value="3">3 {{ labels["booking.guests"] | default(value="Guests") }}</option>
                            <option value="4">4 {{ labels["booking.guests"] | default(value="Guests") }}</option>
                            <option value="5">5 {{ labels["booking.guests"] | default(value="Guests") }}</option>
                            <option value="6">6+ {{ labels["booking.guests"] | default(value="Guests") }}</option>
                        </select>
                    </div>
                    <button type="submit" class="booking-submit">{{ labels["booking.search"] | default(value="Search") }}</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Flatpickr CSS -->
<link rel="stylesheet" href="/.static/vendor/flatpickr/flatpickr.min.css">
<link rel="stylesheet" href="/.static/vendor/flatpickr/airbnb.css">

<!-- Flatpickr JS -->
<script defer src="/.static/vendor/flatpickr/flatpickr.min.js"></script>

<script>
function formatDateISO(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
}

function submitBooking(form) {
    var ci = document.getElementById('checkin')._flatpickr.selectedDates[0];
    var co = document.getElementById('checkout')._flatpickr.selectedDates[0];
    var guests = document.getElementById('guests').value;
    if (!ci || !co) return false;
    var qs = 'from=' + encodeURIComponent(formatDateISO(ci)) +
             '&to=' + encodeURIComponent(formatDateISO(co)) +
             '&adults=' + encodeURIComponent(guests);
    window.location.href = '/.stay?' + qs;
    return false;
}

document.addEventListener('DOMContentLoaded', function() {
    var today = new Date();
    var tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    var dayAfter = new Date(today);
    dayAfter.setDate(dayAfter.getDate() + 2);

    var checkinPicker = flatpickr("#checkin", {
        disableMobile: true,
        dateFormat: "M d, Y",
        minDate: "today",
        defaultDate: tomorrow,
        onChange: function(selectedDates) {
            if (selectedDates[0]) {
                var nextDay = new Date(selectedDates[0]);
                nextDay.setDate(nextDay.getDate() + 1);
                checkoutPicker.set('minDate', nextDay);
                var currentCheckout = checkoutPicker.selectedDates[0];
                if (!currentCheckout || currentCheckout <= selectedDates[0]) {
                    var plusFive = new Date(selectedDates[0]);
                    plusFive.setDate(plusFive.getDate() + 5);
                    checkoutPicker.setDate(plusFive);
                }
            }
        }
    });

    var checkoutPicker = flatpickr("#checkout", {
        disableMobile: true,
        dateFormat: "M d, Y",
        minDate: dayAfter,
        defaultDate: dayAfter
    });
});
</script>
